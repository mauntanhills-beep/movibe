<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🅼🄾🆅🄸🄱🄴</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://upload-widget.cloudinary.com/global/all.js"></script>

<style>
body { margin: 0; font-family: Arial; background: #e6f2ff; }

.navbar {
display: flex;
justify-content: space-between;
padding: 10px 20px;
background: white;
box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.logo {
display: flex;
align-items: center;
gap: 10px;
font-size: 22px;
font-weight: bold;
}

.logo span { color: black; }

.logo img {
height: 35px;
width: 35px;
object-fit: contain;
filter: invert(62%) sepia(97%) saturate(500%) hue-rotate(180deg);
}

.upload-box {
background: white;
padding: 15px;
margin: 15px;
border-radius: 10px;
display: flex;
gap: 10px;
flex-wrap: wrap;
}

.container {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
gap: 15px;
padding: 20px;
}

.video {
background: white;
padding: 10px;
border-radius: 10px;
}

video, img {
width: 100%;
border-radius: 10px;
background: black;
}

button {
margin: 3px;
padding: 6px;
border: none;
border-radius: 5px;
cursor: pointer;
background: skyblue;
color: black;
}

button:hover { opacity: 0.8; }
</style>
</head>

<body>

<div class="navbar">
<div class="logo">
<img src="https://cdn-icons-png.flaticon.com/512/727/727245.png">
<span>🅼🄾🆅🄸🄱🄴</span>
</div>

<a href="https://www.amazon.in" target="_blank">
<button>🛒 Shop</button>
</a>

</div>

<div class="upload-box">
<input type="text" id="videoName" placeholder="Video Name">
<button onclick="uploadVideo()">Upload</button>
<button onclick="openCamera()">📷 Camera</button>
<button onclick="stopCamera()">❌ Stop</button>
</div>

<div class="container" id="videoContainer"></div>

<script>

// ✅ SUPABASE
const supabaseClient = window.supabase.createClient(
"https://wivkaloxlsibjjgtudps.supabase.co",
"sb_publishable_zmNRS5kVltxDXPikLvE3ag_Mj1sCOqg"
);

// 📷 CAMERA CONTROL
let cameraStream = null;

async function openCamera() {
try {
cameraStream = await navigator.mediaDevices.getUserMedia({ video: true });

let video = document.createElement("video");
video.srcObject = cameraStream;
video.autoplay = true;
video.controls = true;

document.getElementById("videoContainer").prepend(video);

} catch {
alert("Camera access denied ❌");
}
}

function stopCamera() {
if(cameraStream){
cameraStream.getTracks().forEach(track => track.stop());
cameraStream = null;
alert("Camera बंद हो गया ✅");
}
}

// 🚀 UPLOAD
function uploadVideo() {
let name = document.getElementById("videoName").value.trim();

if(name===""){
alert("Video name डालो");
return;
}

cloudinary.openUploadWidget({
cloudName: "dvks0ojbu",
uploadPreset: "latw_preset",
resourceType: "auto"
}, async (error, result) => {

if (!error && result && result.event === "success") {

let url = result.info.secure_url;
let type = result.info.resource_type; // 🔥 FIX

await supabaseClient.from("videos").insert([
{ title: name, url: url, type: type, likes: 0, views: 0 }
]);

loadVideos();
document.getElementById("videoName").value = "";
}
});
}

// 📥 LOAD
async function loadVideos() {

let container = document.getElementById("videoContainer");
container.innerHTML = "Loading...";

const { data } = await supabaseClient
.from("videos")
.select("*")
.order("id", { ascending: false });

container.innerHTML = "";

data.forEach(v => {

let media;

// 🔥 PERFECT DETECTION
if(v.type === "video"){
media = `
<video controls onclick="addView(${v.id})">
<source src="${v.url}">
</video>`;
} else {
media = `<img src="${v.url}" onclick="addView(${v.id})">`;
}

container.innerHTML += `
<div class="video">

${media}

<div>${v.title}</div>

<button onclick="skip(this,-10)">⏪</button>
<button onclick="skip(this,10)">⏩</button>
<button onclick="replay(this)">🔄</button>
<button onclick="likeVideo(${v.id},${v.likes})">👍</button>
<button onclick="fullscreenVideo(this)">⛶</button>

<p>👁 ${v.views} | 👍 ${v.likes}</p>

</div>
`;
});
}

// 👍 LIKE
async function likeVideo(id, likes) {

if(localStorage.getItem("liked_"+id)) return;

localStorage.setItem("liked_"+id, true);

await supabaseClient.from("videos")
.update({ likes: likes + 1 })
.eq("id", id);

loadVideos();
}

// 👁 VIEW
function addView(id) {

if(sessionStorage.getItem("viewed_"+id)) return;

sessionStorage.setItem("viewed_"+id, true);

supabaseClient.from("videos")
.select("*")
.eq("id", id)
.single()
.then(({data})=>{
supabaseClient.from("videos")
.update({ views: data.views + 1 })
.eq("id", id)
.then(()=> loadVideos());
});
}

// 🎮 CONTROLS
function skip(btn, sec) {
let video = btn.closest(".video").querySelector("video");
if(video) video.currentTime += sec;
}

function replay(btn) {
let video = btn.closest(".video").querySelector("video");
if(video){
video.currentTime = 0;
video.play();
}
}

// 🔥 FULLSCREEN
function fullscreenVideo(btn) {
let video = btn.closest(".video").querySelector("video");

if (!video) return;

if (document.fullscreenElement) {
document.exitFullscreen();
} else {
video.requestFullscreen();
}
}

// LOAD
loadVideos();

</script>

</body>
</html>
